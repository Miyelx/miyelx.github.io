<body>
  <div>
    <h2 class="info"><img class="header" src="img/MIG.png" width="50px"></h2>
  </div>  

<section class="caja">
  <!-- Bloque de precios a la izquierda -->
  <div class="divisas">
    <p class="precios"> 
       -Venezuela(Bolívar):
       <br>💵 Dólar: <span id="dolarBs">Cargando...</span> 
       <br> 💶 Euro: <span id="euroBs">Cargando...</span>
       <br> <span id="fecha-venezuela" class="fecha">Cargando...</span>
     </p>
     <p class="precios">
      -Colombia(Peso Col.):
       <br>💵️ Dólar: <span id="dolarCop">Cargando...</span> 
       <br>💶 Euro: <span id="euroCop">Cargando...</span>
       <br> <span id="fecha-colombia" class="fecha">Cargando...</span>
     </p>
  </div>
  
  <!-- Bloque del convertidor a la derecha -->
  <div class="contenedor">  
    <h2>
      <img src="img/bs.png" width="60px">
      <input type="tel" inputmode="numeric" placeholder="Bolívares"> 
    </h2>    
    <h2>
      <img src="img/dolar.png" width="60px">
      <input type="tel" inputmode="numeric" placeholder="Dólares"> 
    </h2> 
    <h2>
      <img src="img/eur.png" width="60px">
      <input type="tel" inputmode="numeric" placeholder="Euros">
    </h2>  
    <h2>
      <img src="img/col.png" width="60px">
      <input type="tel" inputmode="numeric" placeholder="Pesos colombianos">  
    </h2>  
    <div>
      <button id="clear" type="button" onclick="limpiar()">Borrar campos 🗑️</button>
    </div>   
  </div> 
</section>

  <footer> <!-- Pie de página con información adicional -->
    <p class="footer">Gracias por visitar. Comparte esta página con tus amigos 😁️</p>
  </footer>
